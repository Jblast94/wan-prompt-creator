<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAN I2V Prompt Optimizer</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="container">
        <div id="left-panel">
            <h2>Prompt Builder</h2>
            <textarea id="prompt-input" rows="10" placeholder="Enter your prompt here..."></textarea>
            <button id="build-prompt">Build Prompt</button>
        </div>
        <div id="center-panel">
            <h2>Live Preview</h2>
            <div id="live-preview"></div>
        </div>
        <div id="right-panel">
            <h2>AI Backend Integration</h2>
            <button id="connect-ai">Connect to AI</button>
            <div id="ai-response"></div>
        </div>
    </div>
</body>
</html>
