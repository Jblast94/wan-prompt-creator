<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Integration Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Unified RPG Dashboard</h1>
    </header>
    <main>
        <div class="container">
            <div class="panel prompt-optimizer">
                <h2>WAN I2V Prompt Optimizer</h2>
                <textarea placeholder="Enter your RPG prompt here..."></textarea>
                <button>Optimize Prompt</button>
            </div>
            <div class="panel story-writer">
                <h2>Interactive Story & Visuals Creator</h2>
                <textarea placeholder="Write your story here..."></textarea>
                <button>Generate Visuals</button>
            </div>
            <div class="panel campaign-manager">
                <h2>RPG Campaign Co-Creator Dashboard</h2>
                <textarea placeholder="Manage your campaign details..."></textarea>
                <button>Update Campaign</button>
            </div>
            <div class="panel visual-preview">
                <h2>Visual Preview</h2>
                <div class="preview-area">Your visuals will appear here</div>
            </div>
            <div class="panel ai-content">
                <h2>AI-Generated Content</h2>
                <div class="ai-result">Generated content will display here</div>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 RPG Dashboard</p>
    </footer>
</body>
</html>
